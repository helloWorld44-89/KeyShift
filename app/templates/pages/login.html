<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - KeyShift</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="static/img/KeyShift.png" type="image/png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light d-flex align-items-center" style="height: 100vh">
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %} {% set last_message_category, last_message = messages[-1] %}
    <div
      class="alert alert-{{ last_message_category }} alert-dismissible text-center fade show position-absolute top-0 w-50"
      role="alert"
    >
      {{ last_message }}
      <button
        type="button"
        class="btn-close"
        data-bs-dismiss="alert"
        aria-label="Close"
      >
        <!-- <span aria-hidden="true">&times;</span> -->
      </button>
    </div>
    {% endif %} {% endwith %}
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body p-4">
              <h3 class="text-center mb-4">KeyShift Login</h3>

              <form method="POST">
                <div class="mb-3">
                  <label class="form-label">Username</label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                  />
                </div>

                <button class="btn btn-primary w-100">Login</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
