<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Login - KeyShift</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="static/img/KeyShift.png" type="image/png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link href="static/css/admin.css" rel="stylesheet" />
    <link href="static/css/login.css" rel="stylesheet" />

  </head>
  <body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% set last_message_category, last_message = messages[-1] %}
    <div class="flash-container">
      <div class="alert alert-{{ last_message_category }} alert-dismissible fade show" role="alert">
        <i class="bi bi-info-circle me-2"></i>{{ last_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </div>
    {% endif %}
    {% endwith %}

    <button class="corner-theme-toggle" id="themeToggle" title="Toggle Dark Mode">
      <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
    </button>

    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <img src="static/img/KeyShift.png" alt="KeyShift Logo" />
          <h3>KeyShift</h3>
          <p>Sign in to your account</p>
        </div>
        <div class="login-body">
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="mb-3">
              <label class="form-label">Username</label>
              <div class="input-icon-wrapper">
                <i class="bi bi-person"></i>
                <input type="text" class="form-control form-control-modern" id="username" name="username" placeholder="Enter your username" autocomplete="username" />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <div class="input-icon-wrapper">
                <i class="bi bi-lock"></i>
                <input type="password" class="form-control form-control-modern" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
              </div>
            </div>
            <button type="submit" class="btn btn-login">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/login.js"></script>
  </body>
</html>
