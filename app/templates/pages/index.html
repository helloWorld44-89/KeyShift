<!doctype html>
<html data-bs-theme="dark">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale =1, user-scalable=no"
    />
    <link rel="icon" href="static/img/KeyShift.png" type="image/png" />
    <title>Guest WIFI</title>
    <link rel="stylesheet" type="text/css" href="/static/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/bootstrap.css" />
  </head>
<body class="background">
  <div class="page-wrap container">
    <div class="w-100" style="max-width: 860px;">
      <!-- Header
      <header class="d-flex justify-content-between align-items-center mb-4 no-print">
        <div class="d-flex align-items-center gap-2">
          <span class="brand-badge text-primary-emphasis">Guest Wi‑Fi</span>
          <span class="vr"></span>
          <span class="text-secondary">Scan to join</span>
        </div>
      </header> -->

      <!-- Main Card -->
      <div class="card rounded-4 overflow-hidden" style="min-height: 600px;">
        <div class="row g-0">
          <div class="col-12 p-4 p-lg-5 d-flex flex-column ">
            <div>
              <div class="muted-kicker">Welcome</div>
              <h1 class="h3 fw-semibold mb-2">Connect to {{ guest.ssidName }} Wi‑Fi</h1>
              <p class="text-secondary mb-0">
                Scan this code with your phone’s camera to join instantly.
              </p>
            </div>
          
            <!-- QR section -->
            <section class="text-center">
              <div id="qrBox" class="qr-box">
                <div id="qrcode" role="img" aria-label="Wi‑Fi QR code">
                  <img src="/static/img/{{ guest.ssidName }}.png" alt="Wi-Fi QR Code">
                </div>
              </div>
            </section>
          </div>
          </div>
        </div>
      </div>
  </div>
</body>
</html>
