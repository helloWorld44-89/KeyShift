<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - KeyShift</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="static/img/KeyShift.png" type="image/png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light d-flex align-items-center" style="height: 100vh">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body p-4">
              <h3 class="text-center mb-5" id="title">Create Admin User</h3>
              <div class="mx-auto text-center d-flex justify-content-center align-items-center d-none"id="dbSpinner" style="min-height: 200px;">
              <span class="spinner-border spinner-border-xl"  role="status" aria-hidden="true"></span>
              </div>
              <form class="mt-2" id="newUserForm">
                <div class="mb-3">
                  <label class="form-label">Username</label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="newUsername"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="newPassword"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    name="confirmPassword"
                  />
                </div>

                <button type="submit" class="btn btn-primary w-100">Create New User</button>
              </form>
              <form class="d-none" id="configForm">
                <div class="mb-3">
                  <label class="form-label">Wireless Controller Type</label>
                  <select class="form-select" name="api_type" id="apiType">
                      <option value="" selected disabled>Select Controller Type</option>
                      <option value="unifi">UNIFI</option>
                      <option value="omada">OMADA</option>                      
                    </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Controller IP Address</label>
                  <input
                    type="text"
                    class="form-control"
                    id="controllerIpInput"
                    name="controllerIp"
                  />
                </div>
                <div class="mb-3 d-none" id="controllerApiKey">
                  <label class="form-label">Controller API Key</label>
                  <input
                    type="text"
                    class="form-control"
                    id="controllerApiKeyInput"
                    name="controllerApiKey"
                  />
                </div>
                <div class="mb-3 d-none" id="controllerUsername">
                  <label class="form-label">Controller Username</label>
                  <input
                    type="text"
                    class="form-control"
                    id="controllerUsernameInput"
                    name="controllerUsername"
                  />
                </div>
                <div class="mb-3 d-none" id="controllerPassword">
                  <label class="form-label">Controller Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="controllerPasswordInput"
                    name="controllePassword"
                  />
                </div>
                <button class="btn btn-primary w-100" id="saveConfig">
                  <span class="spinner-border spinner-border-sm me-2 d-none" id="configSpinner" role="status" aria-hidden="true"></span>
                  <span id="configBtnText">Save Configuration</span>
                </button>              
              </form>
            </div>
            
          </div>
        </div>
      </div>
      
    </div>
     <script src="/static/js/initApp.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
