site_name: KeyShift Docs
site_description: Documentation for KeyShift – a Flask-based Wi-Fi SSID & QR Code management platform
site_author: KeyShift Team
site_url: https://helloWorld44-89.github.io/keyshift/
docs_dir: docs
repo_name: KeyShift

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Models: models.md
  - Routes:
      - Authentication: auth.md
      - Admin: admin.md
      - SSID Management: ssid.md
      - Setup / Init: setup.md
  - API Integrations:
      - UniFi: unifi.md
      - Omada: omada.md
  - Utilities:
      - Password Generator: genPW.md
      - QR Code Generator: genQR.md
      - Cron Scheduler: crontab.md
  - Deployment:
      - Installation: installation.md
      - Docker: docker.md

