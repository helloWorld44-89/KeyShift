name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  provision:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Terraform Apply
        working-directory: /home/jconder44/infra/terraform/deployments/keyshift
        env:
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_vm_ip: ${{ secrets.VM_IP }}
          TF_VAR_vm_gateway: ${{ secrets.VM_GATEWAY }}
          TF_VAR_vm_vlan: ${{ secrets.VM_VLAN }}
        run: |
          terraform init
          terraform apply -auto-approve

  deploy:
    runs-on: self-hosted
    needs: provision
    steps:
      - name: Run Ansible Playbook
        working-directory: /home/jconder44/infra/ansible
        run: |
          ansible-playbook -i inventory/keyshift.ini playbooks/deploy-keyshift.yml